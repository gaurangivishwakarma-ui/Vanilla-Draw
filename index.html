<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>vanilladraw</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <canvas id="canvas" class="canvas_layer"></canvas>
    <div class="ui_layer">
    <div class=" flexbox">
        <div class="item"><img src="images/pen.png" alt="Pen"></div>
        <div class="item"><img src="images/line.png" alt="Line"></div>
        <div class="item"><img src="images/arrow.png" alt="Arrow"></div>
        <div class="item"><img src="images/circle.png" alt="Circle"></div>
        <div class="item"><img src="images/rectangle.png" alt="Rectangle"></div>
        <div class="item"><img src="images/diamond.png" alt="Diamond"></div>
        <div class="item"><img src="images/image.png" alt="Image"></div>
        <div class="item"><img src="images/pointer.png" alt="Pointer"></div>
        <div class="item"><img src="images/eraser.png" alt="Eraser"></div>
    </div>
    <div class="toggle">
    <img id="togglebtn" src="images/moon.png" alt="Dark Mode">
    </div>
    </div>

    <script src="main.js"></script>

</body>

</html>
