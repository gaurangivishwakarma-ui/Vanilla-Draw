<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>vanilladraw</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <canvas id="canvas" class="canvas_layer"></canvas>
    <div class="ui_layer">
        <div class=" flexbox">
            <div class="item" data-tool="pen"><img src="images/pen.png" alt="pen"></div>
            <div class="item" data-tool="line"><img src="images/line.png" alt="line"></div>
            <div class="item" data-tool="square"><img src="images/square.svg" alt="square"></div>
            <div class="item" data-tool="circle"><img src="images/circle.png" alt="circle"></div>
            <div class="item" data-tool="rectangle"><img src="images/rectangle.png" alt="rectangle"></div>
            <div class="item" data-tool="triangle"><img src="images/triangle.png" alt="triangle"></div>
            <div class="item" data-tool="image"><img src="images/image.png" alt="image"></div>
            <div class="item" data-tool="select"><img src="images/select.png" alt="select"></div>
            <div class="item" data-tool="text"><img src="images/text.png" alt="text"></div>

        </div>
        <div class="toggle">
            <img id="togglebtn" src="images/moon.png" alt="Dark Mode">
        </div>
    </div>

    <div id="sidebar" class="sidebar">
        <label>Color: <input type="color" id="color-picker" value="#000000"></label>
        <label>Width: <input type="range" id="width-slider" min="1" max="50" value="2"></label>
        <label>Opacity: <input type="range" id="opacity-slider" min="0.1" max="1" step="0.1" value="1"></label>
        <label>Style:
            <select id="style-picker">
                <option value="solid">Solid</option>
                <option value="dashed">Dashed</option>
            </select>
        </label>

        <hr> <label>Font Size: <input type="number" id="font-size-picker" min="10" max="150" value="24"></label>
        <label>Font:
            <select id="font-family-picker">
                <option value="Arial" style="font-family: Arial;">Arial</option>
                <option value="Times New Roman" style="font-family: 'Times New Roman';">Times New Roman</option>
                <option value="Courier New" style="font-family: 'Courier New';">Courier New</option>
                <option value="Georgia" style="font-family: Georgia;">Georgia</option>
                <option value="Verdana" style="font-family: Verdana;">Verdana</option>
                <option value="Comic Sans MS" style="font-family: 'Comic Sans MS';">Comic Sans</option>
            </select>
        </label>

    </div>

    <script src="main.js"></script>

</body>

</html>
