<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>vanilladraw</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <canvas id="canvas" class="canvas_layer"></canvas>
    <div class="ui_layer">
        <div class=" flexbox">
            <div class="item" data-tool="pen"><img src="images/pen.png" alt="pen"></div>
            <div class="item" data-tool="line"><img src="images/line.png" alt="line"></div>
            <div class="item" data-tool="square"><img src="images/square.svg" alt="square"></div>
            <div class="item" data-tool="circle"><img src="images/circle.png" alt="circle"></div>
            <div class="item" data-tool="rectangle"><img src="images/rectangle.png" alt="rectangle"></div>
            <div class="item" data-tool="triangle"><img src="images/triangle.png" alt="triangle"></div>
            <div class="item" data-tool="image"><img src="images/image.png" alt="image"></div>
            <div class="item" data-tool="pointer"><img src="images/pointer.png" alt="pointer"></div>
            <div class="item" data-tool="text"><img src="images/text.png" alt="text"></div>

        </div>
        <div class="toggle">
            <img id="togglebtn" src="images/moon.png" alt="Dark Mode">
        </div>
    </div>

    <script src="main.js"></script>

</body>

</html>
